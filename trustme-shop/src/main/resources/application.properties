spring.application.name=trustme-shop
# server config
server.port=8080

# Mysql config
spring.datasource.url=jdbc:mysql://localhost:3306/trustme_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${Mysql_password}

# hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Cloudinary config
cloudinary.cloud-name=${cloud_name}
cloudinary.api-key=${cloudinary_api_key}
cloudinary.api-secret=${cloudinary_api_secret}

# upload file config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# C?u hnh Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Forgot Password Configuration
forgot.password.pin.expiration=300000

logging.level.org.springframework.security=WARN

# ── AI Chat Configuration ──────────────────────────────────────────────────
# Provider: "gemini" (default) or "groq"
ai.provider=gemini

# Google Gemini (free tier as of 2026)
# Get API key at: https://aistudio.google.com/app/apikey
# Free models (March 2026):
#   gemini-2.5-flash-lite  → 15 RPM, 1000 req/day  ← recommended (best free limits)
#   gemini-2.5-flash       → 10 RPM, 250 req/day
#   gemini-2.5-pro         → 5 RPM,  100 req/day
ai.gemini.api-key=${GEMINI_API_KEY}
ai.gemini.model=gemini-2.5-flash-lite

# Groq (free tier, very fast)
# Get API key at: https://console.groq.com/keys
# Free models (March 2026):
#   llama-3.3-70b-versatile                    ← general purpose
#   meta-llama/llama-4-scout-17b-16e-instruct  ← newest Llama 4
#   qwen/qwen3-32b                             ← strong reasoning
#   llama-3.1-8b-instant                       ← fastest/lightest
ai.groq.api-key=${GROQ_API_KEY}
ai.groq.model=llama-3.3-70b-versatile